<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Shadow Archive | Supernatural Entities</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card-bg: #0d0d0d;
            --text-main: #e0e0e0;
            --text-dim: #999;
            --accent: #8b0000;
        }

        body { background-color: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; padding: 40px 20px; }
        header { text-align: center; margin-bottom: 60px; }
        h1 { font-family: 'Cinzel', serif; font-size: 3rem; color: #fff; text-transform: uppercase; letter-spacing: 6px; margin-bottom: 10px; }

        .archive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .entity-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #1a1a1a;
            transition: transform 0.3s ease, border-color 0.3s ease;
            text-decoration: none; /* برای لینک */
            color: inherit;
            display: block;
        }

        .entity-card:hover { border-color: var(--accent); transform: translateY(-5px); }

        .img-container { width: 100%; aspect-ratio: 3 / 4; overflow: hidden; background-color: #000; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .entity-card:hover img { transform: scale(1.05); }

        .content { padding: 20px; }
        .content h2 { font-family: 'Cinzel', serif; font-size: 1.2rem; color: #fff; margin: 0 0 10px 0; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .content p { font-size: 0.9rem; color: var(--text-dim); line-height: 1.5; margin: 0; }
    </style>
</head>
<body>

    <header>
        <h1>The Shadow Archive</h1>
        <p style="color: var(--text-dim); letter-spacing: 2px;">50 ENTITIES OF DARKNESS</p>
    </header>

    <div class="archive-grid" id="grid"></div>

    <script src="data.js"></script>

    <script>
        const grid = document.getElementById('grid');

        entities.forEach(entity => {
            const card = document.createElement('a');
            card.className = 'entity-card';
            // لینک به صفحه جزئیات بر اساس ID موجود
            card.href = `details.html?id=${entity.id}`; 
            
            // چک کردن اینکه آیا لینک عکس موجود است یا نه
            const imgSrc = (entity.img && entity.img !== "URL_HERE") ? entity.img : "https://via.placeholder.com/300x400/111/444?text=IMAGE";

            card.innerHTML = `
                <div class="img-container">
                    <img src="${imgSrc}" alt="${entity.name}">
                </div>
                <div class="content">
                    <h2>${entity.name}</h2>
                    <p>${entity.desc}</p>
                </div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
