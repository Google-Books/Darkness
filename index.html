<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Shadow Archive | Supernatural Entities</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card-bg: #0d0d0d; --text-main: #e0e0e0; --text-dim: #999; --accent: #8b0000; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; padding: 40px 20px; }
        .archive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
        .entity-card { background: var(--card-bg); border-radius: 15px; cursor: pointer; border: 1px solid #1a1a1a; transition: 0.3s; overflow: hidden; }
        .entity-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .img-container { width: 100%; aspect-ratio: 3/4; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        #detail-view { display: none; max-width: 800px; margin: 0 auto; background: #0a0a0a; padding: 40px; border-radius: 20px; border: 1px solid #222; }
        .back-btn { color: var(--accent); cursor: pointer; text-transform: uppercase; font-weight: bold; margin-bottom: 30px; display: inline-block; font-size: 0.9rem; }
        #detail-content h1 { font-family: 'Cinzel', serif; color: #fff; font-size: 3rem; margin-bottom: 40px; text-transform: uppercase; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        #detail-content h3 { color: var(--accent); font-family: 'Cinzel', serif; font-size: 1.3rem; margin-top: 30px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        #detail-content p { font-size: 1.1rem; line-height: 1.8; color: #d0d0d0; margin-bottom: 10px; }
        header { text-align: center; margin-bottom: 60px; }
    </style>
</head>
<body>

    <div id="main-view">
        <header>
            <h1 style="font-family: 'Cinzel', serif; color: #fff; font-size: 3rem; letter-spacing: 5px;">THE SHADOW ARCHIVE</h1>
            <p style="color: var(--text-dim); letter-spacing: 2px;">50 ENTITIES OF DARKNESS</p>
        </header>
        <div class="archive-grid" id="grid"></div>
    </div>

    <div id="detail-view">
        <div class="back-btn" onclick="hideDetail()">← Back to Archive</div>
        <div id="detail-content"></div>
    </div>

    <script>
        // لیست تمام موجودات
        const entities = [
            // موجودات تکمیل شده:
            { name: "Jinn", img: "https://trilliardaire.sirv.com/%D8%AC%D9%86/download%20(8).jpg", desc: "Beings made of smokeless fire...", details: { "Other Names": "Jinni, Shayatin, Ifrit...", "Origin": "Pre Islamic Arab...", /* ... بقیه جزئیات اینجا ... */ } },
            { name: "Red Demon", img: "https://trilliardaire.sirv.com/%D8%AC%D9%86/Red%20Demon.jpg", desc: "A being born from fire...", details: { "Other Names": "Fire Demon...", /* ... */ } },
            { name: "Lilith", img: "https://trilliardaire.sirv.com/%D8%AC%D9%86/%D9%84%DB%8C%D9%84%DB%8C%D8%AB.jpg", desc: "A supernatural being...", details: { "Other Names": "Lilītu...", /* ... */ } },
            
            // جایگاه برای بقیه موجودات (به محض اینکه متن‌ها را بفرستی، اینجا پر می‌شود)
            { name: "Lamia", img: "https://trilliardaire.sirv.com/%D8%AC%D9%86/Limia.jpg", desc: "Waiting for content...", details: { "Status": "To be added" } },
            { name: "Wendigo", img: "https://trilliardaire.sirv.com/%D8%AC%D9%86/Wendigo.jpg", desc: "Waiting for content...", details: { "Status": "To be added" } }
            // ... و ۴۵ مورد دیگر
        ];

        const grid = document.getElementById('grid');
        const mainView = document.getElementById('main-view');
        const detailView = document.getElementById('detail-view');
        const detailContent = document.getElementById('detail-content');

        entities.forEach((entity, index) => {
            const card = document.createElement('div');
            card.className = 'entity-card';
            card.innerHTML = `<div class="img-container"><img src="${entity.img}"></div><div style="padding:20px"><h2>${entity.name}</h2><p style="color:var(--text-dim); font-size:0.9rem;">${entity.desc}</p></div>`;
            card.onclick = () => showDetail(index);
            grid.appendChild(card);
        });

        function showDetail(index) {
            const e = entities[index];
            let html = `<h1>${e.name}</h1>`;
            for (const [key, value] of Object.entries(e.details)) {
                html += `<h3>${key}</h3><p>${value}</p>`;
            }
            detailContent.innerHTML = html;
            mainView.style.display = 'none';
            detailView.style.display = 'block';
            window.scrollTo(0,0);
        }

        function hideDetail() {
            mainView.style.display = 'block';
            detailView.style.display = 'none';
        }
    </script>
</body>
</html>
